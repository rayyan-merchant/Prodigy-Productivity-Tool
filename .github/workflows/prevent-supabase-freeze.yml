name: Keep Supabase Awake
on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase with curl
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.VITE_SUPABASE_URL }}/auth/v1/health"
